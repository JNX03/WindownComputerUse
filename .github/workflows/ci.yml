name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }} (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Ruff (lint)
        run: ruff check . --output-format=github

      - name: Smoke-import server
        run: python -c "import server; print('server imported OK')"

      - name: Smoke-import package
        run: python -c "import win_computer_use; print('win_computer_use imported OK')"

  electron:
    name: Electron manager (Node ${{ matrix.node-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x']
    defaults:
      run:
        working-directory: electron-manager
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Lint package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Install
        run: npm install --no-audit --no-fund
