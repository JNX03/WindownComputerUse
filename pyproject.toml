[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
    "electron-manager/node_modules",
    "build",
    "dist",
    ".venv",
    "venv",
]

[tool.ruff.lint]
# Focus on real bugs, not stylistic noise.
# pyflakes (F) catches undefined names, redefinitions, etc.
# pycodestyle errors (E) catch syntax-adjacent issues.
# pyupgrade (UP) and bugbear (B) catch real footguns when triggered.
select = ["E", "F", "B", "UP"]

# Ignore stylistic codes the existing codebase uses on purpose:
#   F401  unused imports (some are re-exports / lazy)
#   F541  f-string without placeholders
#   E702  multiple statements on one line (semicolon)
#   E501  line too long (handled by formatter, not blocker)
#   E402  module-level import not at top (server.py sets DPI awareness first)
#   E741  ambiguous variable name (l, I, O) — appears in math-y code
#   B008  function call in default argument (FastAPI/MCP style)
#   UP    pyupgrade — opt-in only, can be enabled later
ignore = ["F401", "F541", "F841", "E702", "E501", "E402", "E741", "B008", "UP"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
